<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 860" width="420" height="860" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif">
  <defs>
    <linearGradient id="phoneBezel3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2a2a2d"/>
      <stop offset="1" stop-color="#141416"/>
    </linearGradient>
    <linearGradient id="emberGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FF7A45"/>
      <stop offset="1" stop-color="#E23E3E"/>
    </linearGradient>
    <linearGradient id="goldGrad3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#E7C873"/>
      <stop offset="1" stop-color="#C9A24C"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="840" rx="56" fill="url(#phoneBezel3)"/>
  <rect x="20" y="20" width="380" height="820" rx="48" fill="#0A0A0A"/>
  <rect x="160" y="28" width="100" height="28" rx="14" fill="#000"/>
  <text x="50" y="52" fill="#fff" font-size="13" font-weight="600">9:41</text>

  <text x="40" y="120" fill="#C0C0C0" font-size="11" letter-spacing="2" font-weight="800">BAG FULL · BIGGER FISH</text>
  <text x="40" y="156" fill="#fff" font-size="28" font-weight="900">Cull your</text>
  <text x="40" y="186" fill="#fff" font-size="28" font-weight="900">lightest</text>

  <!-- New catch card -->
  <rect x="32" y="208" width="356" height="112" rx="20" fill="url(#emberGrad)"/>
  <text x="50" y="240" fill="#fff" font-size="10" letter-spacing="1.5" font-weight="800" opacity="0.85">NEW CATCH</text>
  <text x="50" y="288" fill="#fff" font-size="44" font-weight="900">4.92 lbs</text>
  <circle cx="350" cy="268" r="14" fill="#fff"/>
  <text x="350" y="272" text-anchor="middle" fill="#E23E3E" font-size="14" font-weight="900">W</text>
  <text x="370" y="310" text-anchor="end" fill="#fff" font-size="12" font-weight="700" opacity="0.9">White tag</text>

  <!-- Release card -->
  <text x="40" y="358" fill="#C0C0C0" font-size="10" letter-spacing="1.5" font-weight="800">RELEASE</text>
  <rect x="32" y="370" width="356" height="96" rx="20" fill="#1C1C1C" stroke="#E7C873" stroke-opacity="0.35"/>
  <circle cx="72" cy="418" r="22" fill="#333"/>
  <text x="72" y="423" text-anchor="middle" fill="#fff" font-size="15" font-weight="800">5</text>
  <text x="106" y="410" fill="#C0C0C0" font-size="10" letter-spacing="1.5" font-weight="800">LIGHTEST IN BAG</text>
  <text x="106" y="440" fill="#fff" font-size="24" font-weight="900">2.98 lbs · Green</text>

  <!-- Weight diff -->
  <rect x="32" y="484" width="356" height="72" rx="20" fill="#141416"/>
  <text x="50" y="512" fill="#C0C0C0" font-size="10" letter-spacing="1.5" font-weight="800">BAG GAIN</text>
  <text x="50" y="544" fill="#7DE37D" font-size="28" font-weight="900">+1.94 lbs</text>
  <text x="370" y="528" text-anchor="end" fill="#C0C0C0" font-size="11">New total</text>
  <text x="370" y="548" text-anchor="end" fill="#fff" font-size="18" font-weight="800">14.42 lbs</text>

  <!-- Fish list -->
  <g font-weight="700">
    <rect x="32" y="578" width="356" height="48" rx="12" fill="#1C1C1C"/>
    <text x="48" y="607" fill="#fff" font-size="14">1 · 4.92 lbs</text>
    <text x="370" y="607" text-anchor="end" fill="#fff" font-size="11" opacity="0.7">White</text>
    <rect x="32" y="634" width="356" height="48" rx="12" fill="#1C1C1C"/>
    <text x="48" y="663" fill="#fff" font-size="14">2 · 4.82 lbs</text>
    <text x="370" y="663" text-anchor="end" fill="#fff" font-size="11" opacity="0.7">Red</text>
    <rect x="32" y="690" width="356" height="48" rx="12" fill="#1C1C1C"/>
    <text x="48" y="719" fill="#fff" font-size="14">3 · 4.11 lbs</text>
    <text x="370" y="719" text-anchor="end" fill="#fff" font-size="11" opacity="0.7">Green</text>
  </g>

  <!-- CTA -->
  <rect x="32" y="756" width="356" height="58" rx="18" fill="url(#goldGrad3)"/>
  <text x="210" y="794" text-anchor="middle" fill="#0A0A0A" font-size="17" font-weight="800">Confirm cull</text>

  <rect x="160" y="822" width="100" height="5" rx="2.5" fill="#fff" opacity="0.5"/>
</svg>
