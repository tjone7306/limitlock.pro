<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 860" width="420" height="860" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif">
  <defs>
    <linearGradient id="phoneBezel2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2a2a2d"/>
      <stop offset="1" stop-color="#141416"/>
    </linearGradient>
    <radialGradient id="micGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#E7C873" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#E7C873" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldGrad2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#E7C873"/>
      <stop offset="1" stop-color="#C9A24C"/>
    </linearGradient>
  </defs>
  <rect x="10" y="10" width="400" height="840" rx="56" fill="url(#phoneBezel2)"/>
  <rect x="20" y="20" width="380" height="820" rx="48" fill="#0A0A0A"/>
  <rect x="160" y="28" width="100" height="28" rx="14" fill="#000"/>
  <text x="50" y="52" fill="#fff" font-size="13" font-weight="600">9:41</text>

  <!-- Header -->
  <text x="40" y="120" fill="#C0C0C0" font-size="11" letter-spacing="2" font-weight="800">VOICE LOG</text>
  <text x="40" y="158" fill="#fff" font-size="28" font-weight="900">Say the weight</text>
  <text x="40" y="188" fill="#fff" font-size="28" font-weight="900">and color</text>

  <!-- Mic glow -->
  <circle cx="210" cy="370" r="170" fill="url(#micGlow)"/>
  <circle cx="210" cy="370" r="110" fill="none" stroke="#E7C873" stroke-opacity="0.25" stroke-width="2"/>
  <circle cx="210" cy="370" r="140" fill="none" stroke="#E7C873" stroke-opacity="0.12" stroke-width="2"/>
  <!-- Mic button -->
  <circle cx="210" cy="370" r="82" fill="url(#goldGrad2)"/>
  <!-- Mic icon -->
  <g transform="translate(210,370)" fill="#0A0A0A">
    <rect x="-14" y="-32" width="28" height="46" rx="14"/>
    <path d="M-26 0 a26 26 0 0 0 52 0" fill="none" stroke="#0A0A0A" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="26" x2="0" y2="40" stroke="#0A0A0A" stroke-width="6" stroke-linecap="round"/>
    <line x1="-14" y1="40" x2="14" y2="40" stroke="#0A0A0A" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Heard text card -->
  <rect x="32" y="500" width="356" height="96" rx="20" fill="#1C1C1C"/>
  <text x="48" y="528" fill="#C0C0C0" font-size="10" letter-spacing="1.5" font-weight="800">HEARD</text>
  <text x="48" y="572" fill="#fff" font-size="30" font-weight="900">"3.52 yellow"</text>

  <!-- Parsed card -->
  <rect x="32" y="612" width="356" height="110" rx="20" fill="#141416" stroke="#E7C873" stroke-opacity="0.25"/>
  <text x="48" y="640" fill="#C0C0C0" font-size="10" letter-spacing="1.5" font-weight="800">PARSED</text>
  <text x="48" y="684" fill="#7DE37D" font-size="34" font-weight="900">3.52 lbs</text>
  <circle cx="340" cy="670" r="12" fill="#E7C873"/>
  <text x="374" y="675" text-anchor="end" fill="#C0C0C0" font-size="12" font-weight="700">Yellow</text>

  <!-- CTA -->
  <rect x="32" y="748" width="356" height="58" rx="18" fill="url(#goldGrad2)"/>
  <text x="210" y="786" text-anchor="middle" fill="#0A0A0A" font-size="17" font-weight="800">Add to bag</text>

  <rect x="160" y="822" width="100" height="5" rx="2.5" fill="#fff" opacity="0.5"/>
</svg>
